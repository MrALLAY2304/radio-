<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Space Radio</title>
    <script>
        // Массив твоих треков с правильным путём
        const playlist = [
            "https://github.io",
            "https://github.io",
            "https://github.io",
            "https://github.io",
            "https://github.io",
            "https://github.io"

        // Выбираем случайный трек

        // Жесткий редирект, который подменяет адрес на чистый .mp3 файл
        window.location.href = randomTrack;
    </script>
</head>
